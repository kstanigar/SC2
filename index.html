<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="style.css" type="text/css" rel="stylesheet">
</head>

<body class="theme-jazz">
    <div id="background"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="container">
        <header>
            <h1>For Sweets!</h1>
            <div id="love-note" class="love-note"></div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchGenre('lightJazz')">Jazz</button>
                <button class="tab-btn" onclick="switchGenre('rnb')">R&B</button>
                <button class="tab-btn" onclick="switchGenre('electronic')">EDM</button>
            </div>
        </header>

        <div class="player-card">
            <div id="song-index">Loading...</div>
            <div id="player"></div>

            <div class="controls">
                <button id="prev-button" class="icon-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                    </svg>
                </button>

                <div class="volume-container">
                    <input type="range" id="volume-control" min="0" max="100" value="50">
                </div>

                <button id="next-button" class="icon-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="countdown" class="countdown"></div>

        <p class="play-help">Tap "Listen in browser" if prompted</p>

        <button class="game-button" onclick="openGame()">Play a Game 🎮</button>
    </div>

    <!-- Simon Says Game Modal -->
    <div id="game-modal" class="game-modal">
        <div class="game-modal-content">
            <button class="close-game" onclick="closeGame()">✕</button>
            <h1>Simon Says</h1>
            <div class="score">
                Score: <span id="game-score">0</span> | Best: <span id="game-best">0</span>
            </div>

            <div class="game-board">
                <button class="color-btn" id="green" data-color="green"></button>
                <button class="color-btn" id="red" data-color="red"></button>
                <button class="color-btn" id="yellow" data-color="yellow"></button>
                <button class="color-btn" id="blue" data-color="blue"></button>
            </div>

            <div class="game-controls">
                <button class="game-btn" id="start-game-btn">Start Game</button>
            </div>

            <div class="game-message" id="game-message">Press Start to play!</div>

            <!-- Music Controls in Game -->
            <div class="game-music-controls">
                <button class="music-control-btn" onclick="playPrevSong()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                    </svg>
                </button>
                <span class="now-playing">Music Playing</span>
                <button class="music-control-btn" onclick="playNextSong()">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script src="script.js"></script>
    <script src="simon.js"></script>
</body>

</html>
